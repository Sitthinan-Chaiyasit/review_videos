<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Video Portfolio{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: #e8e8f0; }
        
        nav {
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,15,0.9);
        }
        .logo { font-size: 1.4rem; font-weight: 700; color: #fff; text-decoration: none; }
        .logo span { color: #7c6ff7; }
        
        .btn {
            padding: 0.5rem 1.2rem;
            background: #7c6ff7;
            color: white;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .btn:hover { background: #6b5fe6; }
        
        footer {
            text-align: center;
            padding: 2rem;
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
            border-top: 1px solid rgba(255,255,255,0.06);
            margin-top: 4rem;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav>
        <a href="/" class="logo">MY<span>.</span>FILMS</a>
        <a href="/admin/" class="btn">⚙ Admin</a>
    </nav>
    
    {% block content %}{% endblock %}
    
    <footer>
        <p>© 2025 Video Portfolio · ทำด้วย Django</p>
    </footer>
</body>
</html>
